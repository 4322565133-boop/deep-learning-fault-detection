experiment:
  name: segformer_faultseg3d

data:
  root: "./data/wangjing"
  train_split: "train"
  val_split: "validation"
  vol_shape: [128,128,128]
  axes: [0,1]
  img_size: 224
  train_repeats: 1
  seed: 42
  val_count: 15
  test_count: 5

train:
  epochs: 100
  batch_size: 24
  lr: 0.001
  weight_decay: 0.02
  betas: [0.9, 0.999]
  num_workers: 8
  aug_p: 0.7
  grad_clip: 0.0

model:
  name: "segformer"
  n_channels: 1
  n_classes: 1
  pretrained: true
  kwargs:
    encoder_name: "mit_b0"

output:
  dir: "./runs/segformer"
